    cannot-launch: "No se puede lanzar el cohete porque el objetivo no está bajo cielo abierto."
    launch-stopped: "Lanzamiento de cohete detenido porque el objetivo ya no está bajo cielo abierto."

  kill-message: "murió debido a un percance"

  features:
    vanish:
      quit-message: "[player] abandonó el juego." # [player] será reemplazado por el nombre del jugador
