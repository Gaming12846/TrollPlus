      - "¡LOLz xD xD!"
      - "¡Abrazos y besos! XOXO!"
      - "¡Ganaste un premio!!!"
      - "¡Dinero gratis! ¡Haz clic ahora!"
      - "¡No te pierdas esta oferta!"
      - "¡Solo por tiempo limitado!"
      - "¡Felicidades! ¡Eres un ganador!"
      - "¡Grandes noticias, todos!"
      - "¡Únete a la diversión ahora!"
      - "¡Mensaje súper secreto!"
      - "¡Se necesita tu opinión!"
      - "¡Esto no es un simulacro!"

    fake-ban:
      message-player: "Has sido baneado de este servidor"
      message-broadcast: "El jugador [player] ha sido baneado permanentemente del servidor" # [player] será reemplazado por el nombre del jugador

    fake-op-message: "[Servidor: Se ha hecho a [player] operador del servidor]" # [player] será reemplazado por el nombre del jugador

