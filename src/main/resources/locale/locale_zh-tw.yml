      hand-item-drop-description: "掉落玩家當前手上拿著的物品"

      control: "控制"
      control-description: "完全控制目標玩家，包括移動，交互，造成傷害，掉落/撿起物品以及聊天"

      flip-backwards: "向後翻轉"
      flip-backwards-description: "當目標玩家交互方塊或攻擊生物實體時，強制讓其向後180度翻轉"

