# 配置版本
version: ${version}

# =================== Global =================================

global:
  metrics-enabled: "正在開啓插件數據收集功能"

  server-version-only-partly-supported: "伺服器版本部分支援。某些功能有所不同或無法使用。"

  checking-for-updates: "正在檢查更新..."
  update-available: "發現新版本！請前往 GitHub 頁面下載最新版本："
  no-update-available: "已是最新版本"
  unable-to-check-for-updates: "檢查新版本失敗："

  configuration-outdated: "您的配置已過時！請將您的配置更新到最新版本。插件無論如何都會嘗試加載它，但可能會出現錯誤"
  language-configuration-outdated: "您的翻譯文件已過時！請將您的翻譯文件更新到最新版本。插件無論如何都會嘗試加載它，但可能會出現錯誤"
  failed-to-save-configuration: "保存配置失敗："

  no-permission: "您沒有足夠的權限執行此命令"
  no-console: "無法從控制台執行命令"
  invalid-syntax: "無效的指令參數！"
  invalid-syntax-usage: "請使用 /"

# =================== TrollPlus Command ======================

trollplus:
  version: "版本："
  developer: "開發者："
  plugin-website: "插件官網："
  report-bugs: "請將 Bug 反饋至："
  reload: "配置文件重載成功"

  blocklist:
    already-in: "玩家 [player] 已經在黑名單中了" # "[player]" 必须包含在信息内，因为它会被替换成玩家的名称
    added: "玩家 [player] 已被添加至黑名單中" # "[player]" 必须包含在信息内，因为它会被替换成玩家的名称
    not-in: "玩家 [player] 不在黑名單中" # "[player]" 必须包含在信息内，因为它会被替换成玩家的名称
    removed: "玩家 [player] 已從黑名單中移除" # "[player]" 必须包含在信息内，因为它会被替换成玩家的名称

# =================== Troll Command ==========================

troll:
  player:
    not-online: "玩家 [player] 目前不在線" # "[player]" 必须包含在信息内，因为它会被替换成玩家的名称
    is-immune: "玩家 [player] 當前處于受保護狀態中" # "[player]" 必须包含在信息内，因为它会被替换成玩家的名称
    quit: "指定的玩家已經退出遊戲"

  not-available:
    vanish: "對不起，妳不能隱身自己"
    teleport: "做得很好，但妳已經處于自己的位置了 :)"
    control: "做得很好，但妳已經被控制了 :)"
    falling-anvils: "無法墜落鐵砧，因爲目標在方塊下"
    slowly-kill: "無法緩慢殺傷，因爲目標未處于生存或冒險模式"
    freefall: "無法自由落體，因爲目標不再暴露在開放的區域"

  rocket:
    cannot-launch: "無法發射，因爲目標頭頂有方塊"
    launch-stopped: "發射停止，因爲目標不再暴露在開放的區域"

  kill-message: "由于愚蠢而死亡"

  features:
    vanish:
      quit-message: "[player] left the game" # "[player]" 必须包含在信息内，因为它会被替换成玩家的名称
      join-message: "[player] joined the game" # "[player]" 必须包含在信息内，因为它会被替换成玩家的名称

    # 給「訊息刷屏」功能的垃圾訊息。您可以根據需要添加任意數量的訊息。
    spam-messages:
      - "嘿，朋友！"
      - "警告：到處都是小丑！"
      - "哈哈哈哈哈！"
      - "LOLz xD xD！"
      - "擁抱和吻！XOXO！"
      - "你贏得了一個獎品！！！"
      - "免費錢！現在點擊！"
      - "不要錯過這個優惠！"
      - "限時優惠！"
      - "恭喜！你是贏家！"
      - "大新聞，大家！"
      - "現在加入樂趣！"
      - "超級秘密消息！"
      - "需要你的意見！"
      - "這不是演習！"

    fake-ban:
      message-player: "妳已被服務器封禁"
      message-broadcast: "玩家 [player] 被服務器封禁" # "[player]" 必须包含在信息内，因为它会被替换成玩家的名称

    fake-op-message: "[Server: Made [player] a server operator]" # "[player]" 必须包含在信息内，因为它会被替换成玩家的名称

