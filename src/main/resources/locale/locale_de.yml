  no-update-available: "Du verwendest die neueste Version. Es sind keine Updates verfügbar."
  unable-to-check-for-updates: "Überprüfung auf Updates fehlgeschlagen."

  config-outdated: "Deine Konfigurationsdatei ist veraltet! Bitte aktualisiere sie auf die neueste Version. Das Plugin wird versuchen, sie zu laden, aber es können Fehler auftreten."
  language-config-outdated: "Deine Sprachkonfigurationsdatei ist veraltet! Bitte aktualisiere sie auf die neueste Version. Das Plugin wird versuchen, sie zu laden, aber es können Fehler auftreten."
  failed-to-save-config: "Fehler beim Speichern der Konfigurationsdatei."

  no-permission: "Du hast keine Berechtigung, diesen Befehl zu verwenden."
  no-console: "Dieser Befehl kann nicht von der Konsole aus verwendet werden."
  invalid-syntax: "Ungültige Befehlssyntax!"
  invalid-syntax-usage: "Richtige Verwendung: /"

# =================== TrollPlus Command ======================

trollplus:
  version: "Plugin-Version:"
  developer: "Entwickler:"
  plugin-website: "Plugin-Website:"
  report-bugs: "Melde Fehler an:"
  reload: "Konfigurationsdateien erfolgreich neu geladen."

  blocklist:
    already-in: "Spieler [player] ist bereits in der Blockierliste." # [player] wird durch den Spielernamen ersetzt
    added: "Spieler [player] wurde zur Blockierliste hinzugefügt." # [player] wird durch den Spielernamen ersetzt
    not-in: "Spieler [player] ist nicht in der Blockierliste." # [player] wird durch den Spielernamen ersetzt
    removed: "Spieler [player] wurde von der Blockierliste entfernt." # [player] wird durch den Spielernamen ersetzt

# =================== Troll Command ==========================

troll:
  player:
    not-online: "Spieler [player] ist derzeit nicht online." # [player] wird durch den Spielernamen ersetzt
    is-immune: "Spieler [player] ist immun." # [player] wird durch den Spielernamen ersetzt
    quit: "Der ausgewählte Spieler hat das Spiel verlassen."

  not-available:
    vanish: "Du kannst Unsichtbarkeit nicht auf dich selbst anwenden."
    teleport: "Du befindest dich bereits am Zielort."
    control: "Du hast bereits die Kontrolle."
    falling-anvils: "Fallende Ambosse können nicht aktiviert werden, da sich das Ziel unter einem Block befindet."
    slowly-kill: "Langsames Töten kann nicht aktiviert werden, da sich das Ziel nicht im Überlebens- oder Abenteuermodus befindet."
    freefall: "Freier Fall kann nicht aktiviert werden, da sich das Ziel nicht unter freiem Himmel befindet."

  rocket:
    cannot-launch: "Rakete kann nicht gestartet werden, da sich das Ziel nicht unter freiem Himmel befindet."
    launch-stopped: "Raketenstart gestoppt, da sich das Ziel nicht mehr unter freiem Himmel befindet."

  kill-message: "ist aufgrund eines Missgeschicks gestorben"

  features:
    vanish:
      quit-message: "[player] hat das Spiel verlassen." # [player] wird durch den Spielernamen ersetzt
      join-message: "[player] ist dem Spiel beigetreten." # [player] wird durch den Spielernamen ersetzt

    # Spam-Nachrichten für die Funktion "Spam-Nachrichten". Füge beliebig viele hinzu
    spam-messages:
      - "Hallo, Kumpel!"
      - "Warnung: Überall Trolle!"
      - "HaHaHaHaHa!"
      - "LOLz xD xD!"
      - "Umarmungen und Küsse! XOXO!"
      - "Du hast einen Preis gewonnen!!!"
      - "Kostenloses Geld! Jetzt klicken!"
      - "Verpassen Sie nicht dieses Angebot!"
      - "Nur für kurze Zeit!"
      - "Glückwunsch! Du bist ein Gewinner!"
      - "Große Neuigkeiten, alle!"
      - "Mach jetzt mit beim Spaß!"
      - "Super geheime Nachricht!"
      - "Deine Meinung ist gefragt!"
      - "Das ist keine Übung!"

    fake-ban:
      message-player: "Du wurdest von diesem Server gebannt"
      message-broadcast: "Spieler [player] wurde dauerhaft vom Server gebannt" # [player] wird durch den Spielernamen ersetzt

    fake-op-message: "[Server: [player] wurde zum Serveroperator gemacht]" # [player] wird durch den Spielernamen ersetzt

