# Configuratieversie
version: ${version}

# =================== Global =================================

global:
  metrics-enabled: "Plugin-metrics zijn ingeschakeld."

  server-version-only-partly-supported: "Serverversie wordt gedeeltelijk ondersteund. Sommige functies zijn anders of niet beschikbaar."

  checking-for-updates: "Controleren op updates..."
  update-available: "Er is een nieuwe update beschikbaar! Download het van Modrinth:"
  no-update-available: "Je gebruikt de nieuwste versie. Er zijn geen updates beschikbaar."
  unable-to-check-for-updates: "Kan niet controleren op updates."

  config-outdated: "Je configuratiebestand is verouderd! Werk het bij naar de nieuwste versie. De plugin zal proberen het te laden, maar er kunnen fouten optreden."
  language-config-outdated: "Je taalconfiguratiebestand is verouderd! Werk het bij naar de nieuwste versie. De plugin zal proberen het te laden, maar er kunnen fouten optreden."
  failed-to-save-config: "Kan configuratiebestand niet opslaan."

  no-permission: "Je hebt geen toestemming om dit commando te gebruiken."
  no-console: "Dit commando kan niet vanaf de console worden gebruikt."
  invalid-syntax: "Ongeldige commandosyntaxis!"
  invalid-syntax-usage: "Juist gebruik: /"

# =================== TrollPlus Command ======================

trollplus:
  version: "Pluginversie:"
  developer: "Ontwikkelaar:"
  plugin-website: "Pluginwebsite:"
  report-bugs: "Meld bugs aan:"
  reload: "Configuratiebestanden succesvol herladen."

  blocklist:
    already-in: "Speler [player] staat al op de blokkeerlijst." # [player] wordt vervangen door de spelersnaam
    added: "Speler [player] is toegevoegd aan de blokkeerlijst." # [player] wordt vervangen door de spelersnaam
    not-in: "Speler [player] staat niet op de blokkeerlijst." # [player] wordt vervangen door de spelersnaam
    removed: "Speler [player] is verwijderd van de blokkeerlijst." # [player] wordt vervangen door de spelersnaam

# =================== Troll Command ==========================

troll:
  player:
    not-online: "Speler [player] is momenteel niet online." # [player] wordt vervangen door de spelersnaam
    is-immune: "Speler [player] is immuun." # [player] wordt vervangen door de spelersnaam
    quit: "De geselecteerde speler heeft het spel verlaten."

  not-available:
    vanish: "Je kunt onzichtbaarheid niet op jezelf gebruiken."
    teleport: "Je bent al op de locatie van het doelwit."
    control: "Je hebt al de controle."
    falling-anvils: "Vallende aanbeelden kunnen niet worden geactiveerd omdat het doelwit onder een blok zit."
    slowly-kill: "Langzaam doden kan niet worden geactiveerd omdat het doelwit niet in overlevings- of avonturenmodus is."
    freefall: "Vrije val kan niet worden geactiveerd omdat het doelwit niet onder de open hemel is."

  rocket:
    cannot-launch: "Raket kan niet worden gelanceerd omdat het doelwit niet onder de open hemel is."
    launch-stopped: "Raketlancering gestopt omdat het doelwit niet langer onder de open hemel is."

  kill-message: "stierf door een ongelukje"

  features:
    vanish:
      quit-message: "[player] heeft het spel verlaten." # [player] wordt vervangen door de spelersnaam
      join-message: "[player] is bij het spel gekomen." # [player] wordt vervangen door de spelersnaam

    # Spamberichten voor de functie "Spamberichten". Voeg zoveel toe als je wilt
    spam-messages:
      - "Hé daar, maat!"
      - "Waarschuwing: Trollen overal!"
      - "HaHaHaHaHa!"
      - "LOLz xD xD!"
      - "Knuffels en kusjes! XOXO!"
      - "Je hebt een prijs gewonnen!!!"
      - "Gratis geld! Klik nu!"
      - "Mis deze aanbieding niet!"
      - "Alleen voor beperkte tijd!"
      - "Gefeliciteerd! Je bent een winnaar!"
      - "Groot nieuws, iedereen!"
      - "Doe nu mee met het plezier!"
      - "Super geheime boodschap!"
      - "Jouw inbreng is nodig!"
      - "Dit is geen oefening!"

    fake-ban:
      message-player: "Je bent verbannen van deze server"
      message-broadcast: "Speler [player] is permanent verbannen van de server" # [player] wordt vervangen door de spelersnaam

    fake-op-message: "[Server: [player] is serveroperator gemaakt]" # [player] wordt vervangen door de spelersnaam

