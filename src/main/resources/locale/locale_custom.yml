# ============================================================
# TrollPlus - Custom Language Configuration
# ============================================================
#
# Custom language configuration file for TrollPlus.
#
# Generated for version ${version}.
# Ensure you update this file when updating the plugin!
#
# Use this file to translate the plugin to your preferred language.
#
# ============================================================

# Configuration version
version: ${version}

# =================== Global =================================

global:
  metrics-enabled: ""

  server-version-only-partly-supported:

  checking-for-updates: ""
  update-available: ""
  no-update-available: ""
  unable-to-check-for-updates: ""

  configuration-outdated: ""
  language-configuration-outdated: ""
  failed-to-save-configuration: ""

  no-permission: ""
  no-console: ""
  invalid-syntax: ""
  invalid-syntax-usage: ""

# =================== TrollPlus Command ======================

trollplus:
  version: ""
  developer: ""
  plugin-website: ""
  report-bugs: ""
  reload: ""

  blocklist:
    already-in: "[player]" # [player] will be replaced by the player's name
    added: "[player]" # [player] will be replaced by the player's name
    not-in: "[player]" # [player] will be replaced by the player's name
    removed: "[player]"  # [player] will be replaced by the player's name

# =================== Troll Command ==========================

troll:
  player:
    not-online: "[player]" # [player] will be replaced by the player's name
    is-immune: "[player]" # [player] will be replaced by the player's name
    quit: ""

  not-available:
    vanish: ""
    teleport: ""
    control: ""
    falling-anvils: ""
    slowly-kill: ""
    freefall: ""

  rocket:
    cannot-launch: ""
    launch-stopped: ""

  kill-message: ""

  features:
    vanish:
      quit-message: "[player]" # [player] will be replaced by the player's name
      join-message: "[player]" # [player] will be replaced by the player's name

    # Spam messages for the "Spam Messages" feature. Add as many as you like
    spam-messages:
      - ""
      - ""
      - ""
      - ""
      - ""
      - ""
      - ""
      - ""
      - ""
      - ""
      - ""
      - ""
      - ""
      - ""
      - ""

    fake-ban:
      message-player: ""
      message-broadcast: "[player]" # [player] will be replaced by the player's name

    fake-op-message: "[player]" # [player] will be replaced by the player's name

