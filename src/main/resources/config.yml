# ============================================================
# TrollPlus
# ============================================================
#
# Main configuration file for TrollPlus.
#
# Generated for version ${version}.
# Ensure to update this file when updating the plugin!
#
# For support or inquiries, please contact us via GitHub or Modrinth.
#
#
# ============================================================

# Configuration version
version: ${version}

# =================== General Settings =======================

# General plugin configuration
general:

  # Supported languages: en, de, es, fr, nl, zh-cn, zh-tw, custom
  # Default: en
  language: en

  # Enable plugin metrics and data collection
  # Default: true
  enable-metrics: true

  # Check for plugin updates on startup
  # Default: true
  check-for-updates: true

  # Logging level: DEBUG, INFO, WARNING, ERROR
  # Default: INFO
  log-level: INFO

# =================== Feature Settings =======================

# Global feature configuration
features:

  # Deactivate active troll features when the target leaves the server
  # Default: true
  deactivate-on-quit: true

  # Allow setting fire (igniting blocks) for TNT track and Trollbows features
  # Default: false
  set-fire: false

  # Allow explosions to destroy blocks for TNT track and Trollbows features
  # Default: false
  break-blocks: false

# =================== Troll Feature Settings =================

# Configuration for individual troll features
troll:

  # Hand Item Drop Feature
  # Period in ticks between dropping the hand item
  # Default: 20
  hand-item-drop-period: 20

  # Spank Feature
  # Period in ticks between spanking actions
  # Default: 120
  spank-period: 120

  # Spam Messages Feature
  # Period in ticks between spam messages sent to the player
  # Default: 20
  spam-messages-period: 20

  # Spam Sounds Feature
  # Period in ticks between spam sounds played to the player
  # Default: 10
  spam-sounds-period: 10

  # Semi Ban Feature
  # Format for the player name in semi-ban messages. The "[player]" tag will be replaced.
  # Default: "<[player]>"
  semi-ban-message-replace: "<[player]>"

  # Falling Anvils Feature
  # Period in ticks between falling anvils
  # Default: 20
  falling-anvils-period: 20

  # TNT Track Feature
  # Period in ticks between TNT events
  # Default: 20
  tnt-track-period: 20

  # Mob Spawner Feature
  # Period in ticks between mob spawns
  # Default: 60
  mob-spawner-period: 60

  # Slowly Kill Feature
  # Period in ticks between damage events
  # Default: 60
  slowly-kill-period: 60

  # Random Teleport Feature
  # Period in ticks between random teleports
  # Default: 160
  random-teleport-period: 160

  # Random Scary Sound Feature
  # Volume of the random scary sound
  # Default: 200
  random-scary-sound-volume: 200

  # Fake Ban Feature
  # Enable or disable broadcasting a message when a fake ban occurs
  # Default: true
  fake-ban-message-broadcast-enabled: true

  # Fake OP Feature
  # Enable or disable broadcasting a message when a fake op occurs
  # Default: true
  fake-op-message-broadcast-enabled: true

  # Freefall Feature
  # Height to which the target is teleported for freefall
  # Default: 100
  freefall-height: 100

  # Vanish Feature
  vanish: # Enable or disable join messages when vanishing
    # Default: false
    join-message-enabled: false

    # Enable or disable quit messages when vanishing
    # Default: false
    quit-message-enabled: false

  # Control Feature
  control: # Enable or disable teleporting the player back to the starting position
    # Default: true
    teleport-back: true

    # Period in ticks between state synchronizations of controller and target
    # Default: 1
    period: 1

  # Rocket Feature
  rocket: # Number of charges determining how many times the target will be launched
    # Default: 20
    charges: 20

    # Period in ticks between rocket charges
    # Default: 5
    period: 5