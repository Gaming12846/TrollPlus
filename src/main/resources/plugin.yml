name: TrollPlus
version: '${version}'
main: de.gaming12846.trollplus.TrollPlus
api-version: '1.17'
prefix: TrollPlus
authors: [ Gaming12846 ]
description: Troll your friends, pull epic pranks, and make Minecraft even more fun!
website: https://github.com/Gaming12846/TrollPlus

commands:
  trollplus:
    description: Main command for TrollPlus plugin
    usage: /<command> <version|reload|blocklist|settings>
    aliases: [ troll+ ]

  troll:
    description: Opens the Troll GUI to prank a specific player
    usage: /<command> <player>

  trollbows:
    description: Opens the Trollbows GUI to obtain special trick bows
    usage: /<command>
    aliases: [ trollbow ]

permissions:
  trollplus.*:
    description: Full administrative access to all TrollPlus features
    default: op
    children:
      trollplus.version: true
      trollplus.reload: true
      trollplus.blocklist.*: true
      trollplus.settings: true
      trollplus.troll: true
      trollplus.bows: true

  trollplus.version:
    description: Permission to use /trollplus version subcommand
    default: true

  trollplus.reload:
    description: Permission to use /trollplus reload subcommand
    default: op

  trollplus.blocklist.*:
    description: Permission to use all /trollplus blocklist subcommands
    default: op
    children:
      trollplus.blocklist.add: true
      trollplus.blocklist.remove: true

  trollplus.blocklist.add:
    description: Permission to use /trollplus blocklist add subcommand
    default: op

  trollplus.blocklist.remove:
    description: Permission to use /trollplus blocklist remove subcommand
    default: op

  trollplus.settings:
    description: Permission to use /trollplus settings subcommand
    default: op

  trollplus.troll:
    description: Permission to use /troll command
    default: op

  trollplus.bows:
    description: Permission to use /trollbows command
    default: op